<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDBI — Enterprise Detection Behavior Index</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #070a0f;
            --bg-secondary: #0c1018;
            --bg-tertiary: #111722;
            --bg-hover: #161d27;
            --bg-selected: #1a2333;
            --border: #1e2a3a;
            --border-light: #253345;
            --text-primary: #e2e8f0;
            --text-secondary: #8899aa;
            --text-muted: #4a5a6a;
            --accent: #38bdf8;
            --accent-dim: #0c4a6e;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── HEADER ─── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 34px; height: 34px;
            background: var(--accent);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 13px; color: #000;
        }
        .header-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
        .header-subtitle { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
        .header-stats { display: flex; gap: 28px; }
        .stat-item { text-align: right; }
        .stat-value { font-size: 20px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

        /* ─── LAYOUT ─── */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 340px; flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-search { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .search-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 13px; outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }

        .tree { flex: 1; overflow-y: auto; padding: 8px 0; }
        .tree::-webkit-scrollbar { width: 3px; }
        .tree::-webkit-scrollbar-track { background: transparent; }
        .tree::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        /* ─── TREE NODES ─── */
        .tree-node {
            display: flex; align-items: center;
            padding: 7px 16px;
            cursor: pointer;
            transition: background 0.12s;
            user-select: none; gap: 8px;
        }
        .tree-node:hover { background: var(--bg-hover); }
        .tree-node.selected { background: var(--bg-selected); border-left: 2px solid var(--accent); }
        .tree-l1 > .tree-node { padding-left: 14px; }
        .tree-l2 > .tree-node { padding-left: 30px; }
        .tree-l3 > .tree-node { padding-left: 46px; }

        .chevron {
            width: 14px; height: 14px; flex-shrink: 0;
            color: var(--text-muted); transition: transform 0.2s;
        }
        .chevron.open { transform: rotate(90deg); }
        .chevron-placeholder { width: 14px; flex-shrink: 0; }

        .tree-label { flex: 1; min-width: 0; }
        .tree-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); line-height: 1; margin-bottom: 2px; }
        .tree-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
        .tree-l1 .tree-name { font-size: 13px; font-weight: 600; }
        .tree-l2 .tree-name { font-weight: 500; color: var(--text-secondary); }
        .tree-l3 .tree-name { color: var(--text-secondary); }

        .tree-children { display: none; }
        .tree-children.open { display: block; }
        .tree-loading { padding: 8px 48px; font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        /* ─── BADGES ─── */
        .sev-badge {
            font-size: 9px; font-family: 'JetBrains Mono', monospace;
            padding: 2px 6px; border-radius: 3px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0;
        }
        .sev-Critical   { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .sev-High       { background: rgba(249,115,22,0.15); color: #f97316; }
        .sev-Medium     { background: rgba(234,179,8,0.15);  color: #eab308; }
        .sev-Low        { background: rgba(56,189,248,0.15); color: #38bdf8; }
        .sev-Informational { background: rgba(148,163,184,0.12); color: #94a3b8; }
        .sev-pending    { background: rgba(139,92,246,0.15); color: #a78bfa; }

        .phase-badge {
            font-size: 9px; font-family: 'JetBrains Mono', monospace;
            padding: 2px 7px; border-radius: 3px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .phase-complete   { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .phase-partial    { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .phase-phase1     { background: rgba(139,92,246,0.12); color: #a78bfa; }

        /* ─── DETAIL PANEL ─── */
        .detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .detail-empty {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; color: var(--text-muted);
        }
        .detail-empty-icon { font-size: 48px; opacity: 0.2; }
        .detail-empty-text { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

        .detail-header { padding: 20px 28px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .detail-meta { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
        .detail-code {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--accent); background: var(--accent-dim);
            padding: 3px 9px; border-radius: 4px; flex-shrink: 0; margin-top: 4px;
        }
        .detail-title-area { flex: 1; }
        .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 5px; }
        .detail-breadcrumb { font-size: 11px; color: var(--text-muted); }
        .detail-badges { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; align-items: flex-end; }
        .detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 16px; max-width: 820px; }

        /* ─── TABS ─── */
        .tabs { display: flex; overflow-x: auto; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 10px 18px; font-size: 12px; font-weight: 500;
            color: var(--text-muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap; transition: all 0.15s; user-select: none;
        }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ─── CONTENT ─── */
        .detail-content { flex: 1; overflow-y: auto; padding: 24px 28px; }
        .detail-content::-webkit-scrollbar { width: 3px; }
        .detail-content::-webkit-scrollbar-track { background: transparent; }
        .detail-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .content-text {
            font-size: 13px; line-height: 1.85; color: var(--text-secondary);
            font-family: 'Outfit', sans-serif; max-width: 900px;
            white-space: pre-wrap; word-wrap: break-word;
        }

        .section-hd {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            margin-bottom: 16px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .no-data { color: var(--text-muted); font-style: italic; font-size: 13px; padding: 24px 0; font-family: 'JetBrains Mono', monospace; }

        /* ─── LOADING ─── */
        .loading-row { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; padding: 24px 0; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── TELEMETRY TABLE ─── */
        .tel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tel-table th {
            text-align: left; padding: 9px 12px;
            background: var(--bg-tertiary); color: var(--text-muted);
            font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border); font-weight: 700; white-space: nowrap;
        }
        .tel-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
        .tel-table tr:hover td { background: var(--bg-hover); }
        .type-m { background: rgba(239,68,68,0.15); color: #ef4444; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .type-o { background: rgba(148,163,184,0.1); color: #94a3b8; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .event-ids { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); }
        .degraded-text { font-size: 11px; color: #f97316; font-style: italic; }

        /* ─── OVERVIEW TABLE ─── */
        .ov-table { border-collapse: collapse; margin-bottom: 24px; }
        .ov-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .ov-label { color: var(--text-muted); font-size: 11px; width: 180px; }

        /* ─── CARDS ─── */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        .card {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.15s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .card-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-bottom: 6px; }
        .card-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }

        /* ─── PHASE 3 BADGES ─── */
        .p3-badge {
            font-size: 9px; font-family: 'JetBrains Mono', monospace;
            padding: 2px 7px; border-radius: 3px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .p3-complete { background: rgba(16,185,129,0.15); color: #10b981; }
        .p3-pending  { background: rgba(100,116,139,0.15); color: #64748b; }

        /* ─── DETECTION TYPE BADGES ─── */
        .det-type {
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            padding: 3px 8px; border-radius: 4px; font-weight: 800;
            letter-spacing: 0.08em; flex-shrink: 0;
        }
        .det-AD { background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
        .det-TD { background: rgba(234,179,8,0.15);  color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
        .det-CD { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
        .det-KD { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }

        /* ─── DETECTION TIER BADGES ─── */
        .tier-must  { background: rgba(239,68,68,0.12);  color: #ef4444; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .tier-should{ background: rgba(234,179,8,0.12);  color: #eab308; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .tier-nice  { background: rgba(148,163,184,0.12);color: #94a3b8; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }

        /* ─── DETECTION CARD ─── */
        .det-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .det-card-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid transparent;
        }
        .det-card-header:hover { background: var(--bg-hover); }
        .det-card-header.open { border-bottom-color: var(--border); }
        .det-card-title { flex: 1; }
        .det-card-name { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4; }
        .det-card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .det-card-body { padding: 20px; display: none; }
        .det-card-body.open { display: block; }

        .det-platform {
            font-size: 9px; font-family: 'JetBrains Mono', monospace;
            padding: 2px 6px; border-radius: 3px; font-weight: 600;
            background: rgba(56,189,248,0.08); color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .det-fp-low    { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 600; background: rgba(34,197,94,0.12); color: #22c55e; }
        .det-fp-medium { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 600; background: rgba(234,179,8,0.12); color: #eab308; }
        .det-fp-high   { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; font-weight: 600; background: rgba(239,68,68,0.12); color: #ef4444; }

        .det-field-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            margin-bottom: 8px; margin-top: 16px;
        }
        .det-field-label:first-child { margin-top: 0; }

        .det-logic-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            font-size: 12px;
            line-height: 1.75;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Outfit', sans-serif;
        }

        .det-sources-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 12px;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ─── INTENT LAYOUT ─── */
        .intent-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) { .intent-grid { grid-template-columns: 1fr; } }

        .intent-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        .intent-card.full-width { grid-column: 1 / -1; }
        .intent-card-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            margin-bottom: 10px;
        }
        .intent-card-content {
            font-size: 13px; line-height: 1.7; color: var(--text-secondary);
            white-space: pre-wrap; word-wrap: break-word;
        }
        .intent-card-content.highlight {
            color: var(--text-primary); font-weight: 500; font-size: 14px; line-height: 1.6;
        }

        .mitre-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .mitre-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            padding: 3px 10px; border-radius: 4px;
            background: rgba(139,92,246,0.12); color: #a78bfa;
            border: 1px solid rgba(139,92,246,0.2);
        }
        .kc-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            padding: 3px 10px; border-radius: 4px;
            background: rgba(249,115,22,0.12); color: #f97316;
            border: 1px solid rgba(249,115,22,0.2);
        }
        .freq-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            padding: 3px 10px; border-radius: 4px;
            background: rgba(56,189,248,0.10); color: var(--accent);
            border: 1px solid rgba(56,189,248,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-brand">
        <div class="header-logo">E</div>
        <div>
            <div class="header-title">EDBI</div>
            <div class="header-subtitle">Enterprise Detection Behavior Index</div>
        </div>
    </div>
    <div class="header-stats">
        <div class="stat-item">
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">Total Behaviors</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-p2">—</div>
            <div class="stat-label">Phase 2 Complete</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-p3">—</div>
            <div class="stat-label">Phase 3 Complete</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">19</div>
            <div class="stat-label">L1 Families</div>
        </div>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-search">
            <input class="search-input" type="text" id="searchInput" placeholder="Search behaviors…" />
        </div>
        <div class="tree" id="tree"></div>
    </div>
    <div class="detail" id="detail">
        <div class="detail-empty">
            <div class="detail-empty-icon">⬡</div>
            <div class="detail-empty-text">Select a family, category or behavior</div>
        </div>
    </div>
</div>

<script>
const URL  = 'https://mphqzvlsdvoepioucnyy.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1waHF6dmxzZHZvZXBpb3Vjbnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzI5MjMsImV4cCI6MjA5MjcwODkyM30.PjGXptKf0DEgyBzzxvbY3v-eeNw6j08cJOHNYnzFo68';
const HDR  = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };

const q = (ep) => fetch(`${URL}/rest/v1/${ep}`, { headers: HDR }).then(r => r.json());

const qCount = async (ep) => {
    const r = await fetch(`${URL}/rest/v1/${ep}`, { headers: { ...HDR, 'Prefer': 'count=exact', 'Range': '0-0' } });
    return r.headers.get('content-range')?.split('/')[1] || '—';
};

function esc(s) {
    return String(s||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;')
        .replace(/\r\n/g,'<br>')
        .replace(/\n/g,'<br>');
}

function sevClass(s) {
    if (!s || s==='pending') return 'sev-pending';
    const map = { critical:'Critical', high:'High', medium:'Medium', low:'Low', informational:'Informational' };
    return 'sev-' + (map[s.toLowerCase()] || 'pending');
}
function sevLabel(s) { return s && s!=='pending' ? s : 'Pending'; }

function phaseClass(s) {
    if (s==='complete')   return 'phase-complete';
    if (s==='call1_done') return 'phase-partial';
    return 'phase-phase1';
}
function phaseLabel(s) {
    if (s==='complete')   return 'Phase 2 ✓';
    if (s==='call1_done') return 'Partial';
    return 'Phase 1';
}

function p3Class(s) { return s === 'complete' ? 'p3-complete' : 'p3-pending'; }
function p3Label(s) { return s === 'complete' ? 'Phase 3 ✓' : 'Phase 3 Pending'; }

function tierClass(t) {
    if (!t) return 'tier-nice';
    const l = t.toLowerCase();
    if (l.includes('must')) return 'tier-must';
    if (l.includes('should')) return 'tier-should';
    return 'tier-nice';
}

function fpClass(fp) {
    if (!fp) return 'det-fp-medium';
    const l = fp.toLowerCase();
    if (l === 'low') return 'det-fp-low';
    if (l === 'high') return 'det-fp-high';
    return 'det-fp-medium';
}

// ── STATS ──
async function loadStats() {
    try {
        const total = await qCount('l3_behaviors');
        document.getElementById('stat-total').textContent = total;
        const p2 = await qCount('l3_behaviors?phase2_status=eq.complete');
        document.getElementById('stat-p2').textContent = p2;
        const p3 = await qCount('l3_behaviors?phase3_status=eq.complete');
        document.getElementById('stat-p3').textContent = p3;
    } catch(e) { console.error(e); }
}

// ── TREE ──
async function buildTree() {
    const tree = document.getElementById('tree');
    tree.innerHTML = '<div class="tree-loading">Loading families…</div>';
    try {
        const families = await q('l1_families?select=*&order=family_code');
        tree.innerHTML = '';
        families.forEach(f => tree.appendChild(makeFamilyNode(f)));
    } catch(e) {
        tree.innerHTML = '<div class="tree-loading">Connection error</div>';
    }
}

function chevronSvg(cls='') {
    return `<svg class="chevron ${cls}" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
    </svg>`;
}

function makeFamilyNode(f) {
    const div = document.createElement('div');
    div.className = 'tree-l1';
    div.innerHTML = `
        <div class="tree-node">
            ${chevronSvg()}
            <div class="tree-label">
                <div class="tree-code">${f.family_code}</div>
                <div class="tree-name">${f.family_name}</div>
            </div>
        </div>
        <div class="tree-children"></div>`;
    const node = div.querySelector('.tree-node');
    node.addEventListener('click', () => onFamilyClick(node, f));
    return div;
}

async function onFamilyClick(node, f) {
    document.querySelectorAll('.tree-node.selected').forEach(n=>n.classList.remove('selected'));
    node.classList.add('selected');
    showFamilyDetail(f);

    const chev = node.querySelector('.chevron');
    const kids = node.nextElementSibling;
    if (kids.classList.contains('open')) { kids.classList.remove('open'); chev.classList.remove('open'); return; }
    chev.classList.add('open'); kids.classList.add('open');
    if (kids.children.length) return;
    kids.innerHTML = '<div class="tree-loading">Loading…</div>';
    try {
        const cats = await q(`l2_categories?select=*&family_id=eq.${f.family_id}&order=category_code`);
        kids.innerHTML = '';
        cats.forEach(c => kids.appendChild(makeCatNode(c, f)));
    } catch(e) { kids.innerHTML = '<div class="tree-loading">Error</div>'; }
}

function makeCatNode(c, f) {
    const div = document.createElement('div');
    div.className = 'tree-l2';
    div.innerHTML = `
        <div class="tree-node">
            ${chevronSvg()}
            <div class="tree-label">
                <div class="tree-code">${c.category_code}</div>
                <div class="tree-name">${c.category_name}</div>
            </div>
        </div>
        <div class="tree-children"></div>`;
    const node = div.querySelector('.tree-node');
    node.addEventListener('click', () => onCatClick(node, c, f));
    return div;
}

async function onCatClick(node, c, f) {
    document.querySelectorAll('.tree-node.selected').forEach(n=>n.classList.remove('selected'));
    node.classList.add('selected');
    showCatDetail(c, f);

    const chev = node.querySelector('.chevron');
    const kids = node.nextElementSibling;
    if (kids.classList.contains('open')) { kids.classList.remove('open'); chev.classList.remove('open'); return; }
    chev.classList.add('open'); kids.classList.add('open');
    if (kids.children.length) return;
    kids.innerHTML = '<div class="tree-loading">Loading…</div>';
    try {
        const behaviors = await q(`l3_behaviors?select=*&category_id=eq.${c.category_id}&order=behavior_code`);
        kids.innerHTML = '';
        behaviors.forEach(b => kids.appendChild(makeBehaviorNode(b, c, f)));
    } catch(e) { kids.innerHTML = '<div class="tree-loading">Error</div>'; }
}

function makeBehaviorNode(b, c, f) {
    const div = document.createElement('div');
    div.className = 'tree-l3';
    const sev = sevLabel(b.severity);
    div.innerHTML = `
        <div class="tree-node">
            <div class="chevron-placeholder"></div>
            <div class="tree-label">
                <div class="tree-code">${b.behavior_code}</div>
                <div class="tree-name">${b.behavior_name}</div>
            </div>
            <span class="sev-badge ${sevClass(b.severity)}">${sev.charAt(0)}</span>
        </div>`;
    const node = div.querySelector('.tree-node');
    node.addEventListener('click', () => {
        document.querySelectorAll('.tree-node.selected').forEach(n=>n.classList.remove('selected'));
        node.classList.add('selected');
        showBehaviorDetail(b, c, f);
    });
    return div;
}

                <div class="tab" onclick="switchTab(this,'methods')">Execution Methods</div>

                <div class="tab" onclick="switchTab(this,'p3-detections')" style="color:${hasP3?'#a855f7':'var(--text-muted)'}">Detection Scenarios</div>
            </div>
        </div>
        <div class="detail-content">
            <div class="tab-panel active" id="tab-overview">   <div class="loading-row"><div class="spinner"></div>Loading…</div></div>
            <div class="tab-panel" id="tab-locations">  <div class="loading-row"><div class="spinner"></div>Loading…</div></div>
            <div class="tab-panel" id="tab-methods">    <div class="loading-row"><div class="spinner"></div>Loading…</div></div>
            <div class="tab-panel" id="tab-exploitation"><div class="loading-row"><div class="spinner"></div>Loading…</div></div>

async function loadPhase2(b) {
    try {
        const [ctxArr, tel] = await Promise.all([
            q(`behavior_context?select=*&behavior_id=eq.${b.behavior_id}`),
            q(`detection_telemetry?select=*&behavior_id=eq.${b.behavior_id}&order=telemetry_type.desc`)
        ]);
        const ctx = ctxArr[0] || null;
        const mand = tel.filter(t=>t.telemetry_type==='mandatory').length;

        // Get scenario count if Phase 3 complete
        let scenarioCount = '—';
        if (b.phase3_status === 'complete') {
            const scRes = await fetch(`${URL}/rest/v1/detection_scenarios?behavior_id=eq.${b.behavior_id}`, {
                headers: { ...HDR, 'Prefer': 'count=exact', 'Range': '0-0' }
            });
            scenarioCount = scRes.headers.get('content-range')?.split('/')[1] || '—';
        }

        // Overview
        set('tab-overview', `
            <div class="section-hd">Summary</div>
            <table class="ov-table">
                <tr><td class="ov-label">Severity</td><td><span class="sev-badge ${sevClass(b.severity)}">${sevLabel(b.severity)}</span></td></tr>
                <tr><td class="ov-label">Justification</td><td style="color:var(--text-secondary);font-size:12px;line-height:1.5">${esc(b.severity_justification||'Not yet assigned')}</td></tr>
                <tr><td class="ov-label">Phase 2 Status</td><td><span class="phase-badge ${phaseClass(b.phase2_status)}">${phaseLabel(b.phase2_status)}</span></td></tr>
                <tr><td class="ov-label">Phase 3 Status</td><td><span class="p3-badge ${p3Class(b.phase3_status)}">${p3Label(b.phase3_status)}</span></td></tr>
                <tr><td class="ov-label">Telemetry Sources</td><td style="color:var(--text-secondary)">${tel.length} total · <span style="color:#ef4444">${mand} mandatory</span></td></tr>
                <tr><td class="ov-label">Detection Scenarios</td><td style="color:var(--text-secondary)">${scenarioCount} scenarios mapped</td></tr>
                <tr><td class="ov-label">Detection Notes</td><td style="color:var(--text-secondary)">${ctx ? 'Available' : 'Not generated'}</td></tr>
            </table>
            ${ctx && ctx.detection_notes ? `<div class="section-hd" style="margin-top:24px">Detection Notes Preview</div><div class="content-text" style="max-width:800px">${esc(ctx.detection_notes.split('\n').slice(0,5).join('\n'))}</div>` : ''}
        `);

        setFormatted('tab-locations',   ctx?.occurrence_locations);
        setFormatted('tab-methods',     ctx?.execution_methods);
        setFormatted('tab-exploitation',ctx?.exploitation_paths);
        setFormatted('tab-tel-sources', ctx?.telemetry_sources);
        setFormatted('tab-det-notes',   ctx?.detection_notes);

        if (!tel.length) {
            set('tab-tel-table', noData());
        } else {
            const rows = tel.map(t => `
                <tr>
                    <td><span class="${t.telemetry_type==='mandatory'?'type-m':'type-o'}">${t.telemetry_type}</span></td>
                    <td style="color:var(--text-primary);font-weight:500">${esc(t.telemetry_source||'')}</td>
                    <td style="color:var(--text-secondary)">${esc(t.platform||'')}</td>
                    <td class="event-ids">${esc(t.event_ids||'')}</td>
                    <td>${t.degraded_mode ? `<span class="degraded-text">${esc(t.degraded_mode)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
                </tr>`).join('');
            set('tab-tel-table', `
                <table class="tel-table">
                    <thead><tr><th>Type</th><th>Source</th><th>Platform</th><th>Event IDs</th><th>Degraded Mode</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>`);
        }
    } catch(e) {
        console.error(e);
        set('tab-overview', '<div class="no-data">Error loading Phase 2 data.</div>');
    }
}

function renderPhase1Only(b) {
    set('tab-overview', `
        <div class="section-hd">Phase 1 Behavior Definition</div>
        <div class="content-text" style="max-width:800px">${esc(b.description||'')}</div>
        <br><p style="color:var(--text-muted);font-size:12px;font-family:'JetBrains Mono',monospace">Phase 2 detection engineering content not yet generated for this behavior.</p>
    `);
    ['tab-locations','tab-methods','tab-exploitation','tab-tel-sources','tab-det-notes','tab-tel-table'].forEach(id => set(id, noData()));
}

async function loadPhase3(b) {
    try {
        const [intentArr, scenarios] = await Promise.all([
            q(`detection_intent?select=*&behavior_id=eq.${b.behavior_id}`),
            q(`detection_scenarios?select=*&behavior_id=eq.${b.behavior_id}&order=detection_tier,scenario_id`)
        ]);
        const intent = intentArr[0] || null;

        // ── DETECTION INTENT TAB ──
        if (!intent) {
            set('tab-p3-intent', '<div class="no-data">Detection intent not yet generated.</div>');
        } else {
            set('tab-p3-intent', `
                <div class="intent-grid">
                    <div class="intent-card full-width">
                        <div class="intent-card-label">Detection Objective</div>
                        <div class="intent-card-content highlight">${esc(intent.detection_objective||'')}</div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">Invariant Condition</div>
                        <div class="intent-card-content">${esc(intent.invariant_condition||'')}</div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">Violation Condition</div>
                        <div class="intent-card-content">${esc(intent.violation_condition||'')}</div>
                    </div>
                    <div class="intent-card full-width">
                        <div class="intent-card-label">Risk if Undetected</div>
                        <div class="intent-card-content">${esc(intent.risk_if_undetected||'')}</div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">MITRE & Kill Chain</div>
                        <div class="mitre-row">
                            <span class="kc-tag">${esc(intent.kill_chain_stage||'')}</span>
                            <span class="mitre-tag">${esc(intent.mitre_tactic||'')}</span>
                            <span class="mitre-tag">${esc(intent.mitre_technique||'')}</span>
                        </div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">Review Frequency</div>
                        <span class="freq-tag">${esc(intent.review_frequency||'')}</span>
                    </div>
                    <div class="intent-card full-width">
                        <div class="intent-card-label">Test Scenario</div>
                        <div class="intent-card-content">${esc(intent.test_scenario||'')}</div>
                    </div>
                    <div class="intent-card full-width">
                        <div class="intent-card-label">Expected Alert</div>
                        <div class="intent-card-content">${esc(intent.expected_alert||'')}</div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">Detection Blind Spots</div>
                        <div class="intent-card-content">${esc(intent.blind_spot_summary||'')}</div>
                    </div>
                    <div class="intent-card">
                        <div class="intent-card-label">Compensating Controls</div>
                        <div class="intent-card-content">${esc(intent.compensating_controls||'')}</div>
                    </div>
                </div>
            `);
        }

        // ── DETECTION SCENARIOS TAB ──
        if (!scenarios.length) {
            set('tab-p3-detections', '<div class="no-data">Detection scenarios not yet generated.</div>');
            return;
        }

        // Group by tier for display
        const mustHave   = scenarios.filter(s => s.detection_tier === 'Must-Have');
        const shouldHave = scenarios.filter(s => s.detection_tier === 'Should-Have');
        const niceHave   = scenarios.filter(s => s.detection_tier === 'Nice-to-Have');

        function renderScenarios(list) {
            return list.map(s => {
                const cardId = `sc-${s.scenario_id}`;
                const deployTags = (s.deploy_on||'').split(',').map(p =>
                    `<span style="font-size:9px;font-family:'JetBrains Mono',monospace;padding:1px 5px;border-radius:3px;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-muted)">${p.trim()}</span>`
                ).join('');

                return `
                <div class="det-card">
                    <div class="det-card-header" onclick="toggleDetCard('${cardId}', this)">
                        <div class="det-card-title">
                            <div class="det-card-name">${esc(s.scenario_name||'')}</div>
                            <div class="det-card-meta">
                                <span class="${tierClass(s.detection_tier)}">${esc(s.detection_tier||'')}</span>
                                ${deployTags}
                                <span class="${fpClass(s.false_positive_risk)}">FP: ${esc(s.false_positive_risk||'')}</span>
                                <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);padding:2px 6px;background:var(--bg-secondary);border-radius:3px;border:1px solid var(--border)">${esc(s.response_action||'')}</span>
                                ${s.time_window ? `<span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--accent)">⏱ ${esc(s.time_window)}</span>` : ''}
                                <span class="mitre-tag" style="font-size:9px;padding:1px 5px">${esc(s.mitre_technique||'')}</span>
                            </div>
                        </div>
                    </div>
                    <div class="det-card-body" id="${cardId}">
                        <div class="det-field-label">Invariant Condition</div>
                        <div class="det-sources-box" style="color:var(--text-secondary)">${esc(s.invariant_condition||'')}</div>

                        <div class="det-field-label">Violation Predicate</div>
                        <div class="det-logic-box" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#38bdf8">${esc(s.violation_predicate||'')}</div>

                        <div class="det-field-label">Detection Logic</div>
                        <div class="det-logic-box">${esc(s.detection_logic||'')}</div>

                        ${s.data_sources ? `
                        <div class="det-field-label">Data Sources Required</div>
                        <div class="det-sources-box">${esc(s.data_sources)}</div>
                        ` : ''}

                        ${s.time_window || s.grouping_entity ? `
                        <div class="det-field-label">Correlation Details</div>
                        <div style="font-size:12px;color:var(--text-secondary);padding:8px 0;display:flex;gap:24px">
                            ${s.time_window ? `<span><span style="color:var(--text-muted);font-size:10px">TIME WINDOW</span><br>${esc(s.time_window)}</span>` : ''}
                            ${s.grouping_entity ? `<span><span style="color:var(--text-muted);font-size:10px">GROUPING ENTITY</span><br>${esc(s.grouping_entity)}</span>` : ''}
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        let html = `<div style="max-width:960px">`;
        html += `<div style="margin-bottom:16px;font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${scenarios.length} detection scenarios · ${mustHave.length} must-have · ${shouldHave.length} should-have · ${niceHave.length} nice-to-have</div>`;

        if (mustHave.length) {
            html += `<div class="section-hd" style="color:#ef4444">Must-Have Scenarios (${mustHave.length})</div>`;
            html += renderScenarios(mustHave);
        }
        if (shouldHave.length) {
            html += `<div class="section-hd" style="color:#eab308;margin-top:24px">Should-Have Scenarios (${shouldHave.length})</div>`;
            html += renderScenarios(shouldHave);
        }
        if (niceHave.length) {
            html += `<div class="section-hd" style="color:#94a3b8;margin-top:24px">Nice-to-Have Scenarios (${niceHave.length})</div>`;
            html += renderScenarios(niceHave);
        }
        html += `</div>`;

        set('tab-p3-detections', html);

    } catch(e) {
        console.error(e);
        set('tab-p3-intent',     '<div class="no-data">Error loading Phase 3 data.</div>');
        set('tab-p3-detections', '<div class="no-data">Error loading Phase 3 data.</div>');
    }
}

function toggleDetCard(id, headerEl) {
    const body = document.getElementById(id);
    if (!body) return;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    headerEl.classList.toggle('open', !isOpen);
}

function setFormatted(id, text) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!text) { el.innerHTML = '<div class="no-data">Phase 2 data not yet generated.</div>'; return; }
    el.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'content-text';
    div.textContent = text;
    el.appendChild(div);
}

function noData() { return '<div class="no-data">Phase 2 data not yet generated for this behavior.</div>'; }
function set(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }

function switchTab(tabEl, tabId) {
    tabEl.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tabEl.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const p = document.getElementById(`tab-${tabId}`);
    if (p) p.classList.add('active');
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('.tree-l3').forEach(node => {
        node.style.display = node.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    if (!q) document.querySelectorAll('.tree-l3').forEach(n => n.style.display = '');
});

// ── INIT ──
loadStats();
buildTree();
